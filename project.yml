name: WarpTemplateAppleMultiplatform
options:
  bundleIdPrefix: com.aloewright
  deploymentTarget:
    iOS: 18.0
    macOS: 15.0
    watchOS: 11.0
settings:
  base:
    SWIFT_VERSION: 6.0
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: YES
    PRODUCT_NAME: "$(TARGET_NAME)"
    MARKETING_VERSION: 0.0.0
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
packages:
  FoundationModelsBridge:
    path: Packages/FoundationModelsBridge
  WarpTemplateCore:
    path: Packages/WarpTemplateCore
targets:
  WarpTemplateiOS:
    type: application
    platform: iOS
    deploymentTarget: 18.0
    sources:
      - path: Sources/iOS
    dependencies:
      - package: WarpTemplateCore
    settings:
      base:
        TARGETED_DEVICE_FAMILY: 1
        PRODUCT_BUNDLE_IDENTIFIER: com.aloewright.warp-template-apple-multiplatform.ios
  WarpTemplateiPadOS:
    type: application
    platform: iOS
    deploymentTarget: 18.0
    sources:
      - path: Sources/iPadOS
    dependencies:
      - package: WarpTemplateCore
    settings:
      base:
        TARGETED_DEVICE_FAMILY: 2
        PRODUCT_BUNDLE_IDENTIFIER: com.aloewright.warp-template-apple-multiplatform.ipados
  WarpTemplatemacOS:
    type: application
    platform: macOS
    deploymentTarget: 15.0
    sources:
      - path: Sources/macOS
    dependencies:
      - package: WarpTemplateCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aloewright.warp-template-apple-multiplatform.macos
  WarpTemplatewatchOS:
    type: application
    platform: watchOS
    deploymentTarget: 11.0
    sources:
      - path: Sources/watchOS
    dependencies:
      - package: WarpTemplateCore
    settings:
      base:
        TARGETED_DEVICE_FAMILY: 4
        PRODUCT_BUNDLE_IDENTIFIER: com.aloewright.warp-template-apple-multiplatform.ios.watchos
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.aloewright.warp-template-apple-multiplatform.ios
  WarpTemplateiOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: 18.0
    sources:
      - path: Tests/iOSTests
    dependencies:
      - target: WarpTemplateiOS
      - package: WarpTemplateCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aloewright.warp-template-apple-multiplatform.ios-tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/WarpTemplateiOS.app/WarpTemplateiOS"
  WarpTemplateiPadOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: 18.0
    sources:
      - path: Tests/iPadOSTests
    dependencies:
      - target: WarpTemplateiPadOS
      - package: WarpTemplateCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aloewright.warp-template-apple-multiplatform.ipados-tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/WarpTemplateiPadOS.app/WarpTemplateiPadOS"
  WarpTemplatemacOSTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: 15.0
    sources:
      - path: Tests/macOSTests
    dependencies:
      - target: WarpTemplatemacOS
      - package: WarpTemplateCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aloewright.warp-template-apple-multiplatform.macos-tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/WarpTemplatemacOS.app/Contents/MacOS/WarpTemplatemacOS"
  WarpTemplatewatchOSTests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: 11.0
    sources:
      - path: Tests/watchOSTests
    dependencies:
      - target: WarpTemplatewatchOS
      - package: WarpTemplateCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aloewright.warp-template-apple-multiplatform.watchos-tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/WarpTemplatewatchOS.app/WarpTemplatewatchOS"
schemes:
  WarpTemplateiOS:
    build:
      targets:
        WarpTemplateiOS: all
    test:
      targets:
        - WarpTemplateiOSTests
  WarpTemplateiPadOS:
    build:
      targets:
        WarpTemplateiPadOS: all
    test:
      targets:
        - WarpTemplateiPadOSTests
  WarpTemplatemacOS:
    build:
      targets:
        WarpTemplatemacOS: all
    test:
      targets:
        - WarpTemplatemacOSTests
  WarpTemplatewatchOS:
    build:
      targets:
        WarpTemplatewatchOS: all
    test:
      targets:
        - WarpTemplatewatchOSTests
